<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    :root {
      --bg: #ffffff;
      --text: #24292f;
      --text-secondary: #57606a;
      --heading: #1a1a1a;
      --border: #d1d9e0;
      --link: #0969da;
      --bold: #24292f;
      --code-bg: #f6f8fa;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #e6edf3;
        --text-secondary: #8b949e;
        --heading: #f0f6fc;
        --border: #30363d;
        --link: #58a6ff;
        --bold: #f0f6fc;
        --code-bg: #161b22;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
        Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      background-color: var(--bg);
      padding: 2rem 1.5rem;
      max-width: 860px;
      margin: 0 auto;
    }

    h1, h2, h3, h4, h5, h6 {
      color: var(--heading);
      margin-top: 1.8em;
      margin-bottom: 0.6em;
      font-weight: 600;
      line-height: 1.3;
    }

    h1 { font-size: 2em; margin-top: 0; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    h3 { font-size: 1.25em; }

    p {
      margin-bottom: 1em;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    strong {
      color: var(--bold);
      font-weight: 600;
    }

    ul, ol {
      padding-left: 2em;
      margin-bottom: 1em;
    }

    li {
      margin-bottom: 0.35em;
    }

    li p {
      margin-bottom: 0.35em;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    code {
      background-color: var(--code-bg);
      padding: 0.2em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    pre {
      background-color: var(--code-bg);
      padding: 1em;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1em;
    }

    pre code {
      padding: 0;
      background: none;
    }

    blockquote {
      border-left: 3px solid var(--border);
      padding-left: 1em;
      color: var(--text-secondary);
      margin-bottom: 1em;
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
